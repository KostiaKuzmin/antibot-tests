services:
  server:
    build: .
    container_name: antibot-server
    command: python server.py
    expose:
      - "8000"
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 2s
      timeout: 2s
      retries: 15
      start_period: 2s

  tests:
    build: .
    container_name: antibot-tests
    depends_on:
      server:
        condition: service_healthy
    environment:

      TEST_BASE_URL: http://server:8000
    command: pytest -v --color=yes
